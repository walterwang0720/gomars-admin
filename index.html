<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOMARS Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      color: #EA5404;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .sub {
      font-size: 0.95rem;
      color: #888;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #1D7A4E;
      border-radius: 50%;
      margin-left: 12px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .status {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">GOMARS<span class="dot"></span></div>
    <div class="sub">Admin System</div>
    <div class="status">系統建置中 · Coming Soon</div>
  </div>
</body>
</html>
