<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>門票資料庫 — GOMARS</title>
<link rel="stylesheet" href="gomars_base.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg-page);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden}

.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:56px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700}
.topbar-count{font-size:12px;color:var(--tx3);background:var(--bg-surface);border:1px solid var(--border);border-radius:20px;padding:2px 8px}
.topbar-right{margin-left:auto;display:flex;gap:8px}

.filter-bar{display:flex;gap:10px;align-items:center;padding:12px 20px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.filter-bar select{font-size:13px}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:300px}
.search-wrap input{width:100%;padding-left:30px}
.search-wrap .ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--tx3);pointer-events:none}

.tbl-wrap{flex:1;overflow-y:auto;padding:16px 20px}
table{width:100%;border-collapse:collapse;background:var(--bg-card);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
thead th{background:var(--bg-surface);padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border-soft)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg-hover)}
tbody td{padding:10px 12px;font-size:13px;color:var(--tx);vertical-align:middle}
.dest-chip{display:inline-block;font-size:11px;background:var(--blb);color:var(--bl);border-radius:5px;padding:2px 7px;font-weight:600;white-space:nowrap}
.thumb{width:44px;height:32px;border-radius:5px;object-fit:cover;background:var(--bg-surface);border:1px solid var(--border);display:block}
.empty-row td{text-align:center;padding:48px;color:var(--tx3);font-size:13px}
.ops{display:flex;gap:6px}

/* ── Modal ── */
.modal-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.modal-bd.open{display:flex}
.modal{background:var(--bg-card);border-radius:12px;width:560px;max-width:calc(100vw - 32px);max-height:calc(100vh - 40px);display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-hdr{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-hdr h3{font-size:15px;font-weight:700;flex:1}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--tx3);line-height:1;padding:2px 6px}
.close-btn:hover{color:var(--tx)}
.modal-body{overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;flex:1}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0}

.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:600;color:var(--tx2)}
.field textarea{resize:vertical;min-height:72px}

/* ── Photo upload area ── */
.upload-area{position:relative;border:2px dashed var(--border);border-radius:8px;cursor:pointer;min-height:88px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg-surface);transition:border-color .15s}
.upload-area:hover,.upload-area.drag-over{border-color:var(--orbit);background:var(--brl)}
.upload-hint{display:flex;flex-direction:column;align-items:center;gap:4px;padding:16px;pointer-events:none;user-select:none}
.upload-hint-icon{font-size:22px}
.upload-hint-text{font-size:12px;color:var(--tx3)}
.upload-preview{width:100%;max-height:160px;object-fit:cover;display:none}
.upload-preview.show{display:block}
.upload-meta{font-size:11px;color:var(--tx3);margin-top:4px;display:flex;gap:8px;align-items:center}
.upload-clear{background:none;border:none;cursor:pointer;font-size:12px;color:var(--tx3);text-decoration:underline;padding:0}
.upload-clear:hover{color:#e53e3e}

/* ── Pricing rows ── */
.pricing-rows{display:flex;flex-direction:column;gap:6px}
.pricing-row{display:flex;gap:8px;align-items:center}
.pricing-row input:first-child{flex:1}
.pricing-row input:nth-child(2){width:110px}
.rm-row-btn{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:16px;line-height:1;padding:4px;border-radius:4px}
.rm-row-btn:hover{color:#e53e3e;background:#fff5f5}
.add-row-btn{align-self:flex-start;font-size:12px}

.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:999}
</style>
</head>
<body>

<div class="topbar">
  <span style="font-size:18px">🎫</span>
  <span class="topbar-title">門票資料庫</span>
  <span class="topbar-count" id="count-chip">0 筆</span>
  <div class="topbar-right">
    <button class="btn btn-primary btn-sm" onclick="openModal()">＋ 新增景點</button>
  </div>
</div>

<div class="filter-bar">
  <div class="search-wrap">
    <span class="ico">🔍</span>
    <input class="inp" id="search-inp" type="text" placeholder="搜尋景點名…" oninput="renderTable()">
  </div>
  <select class="inp" id="filter-dest" style="min-width:180px" onchange="renderTable()">
    <option value="">全部目的地</option>
  </select>
</div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:44px"></th>
        <th>目的地</th>
        <th>景點名稱</th>
        <th>介紹</th>
        <th>分級票價</th>
        <th style="width:90px">操作</th>
      </tr>
    </thead>
    <tbody id="tbl-body"></tbody>
  </table>
</div>

<!-- Add/Edit Modal -->
<div class="modal-bd" id="modal-bd" onclick="onBdClick(event)">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modal-title">新增景點</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>目的地</label>
        <select class="inp" id="f-dest"></select>
      </div>
      <div class="field">
        <label>景點名稱</label>
        <input class="inp" id="f-name" type="text" placeholder="例：環球影城">
      </div>
      <div class="field">
        <label>介紹</label>
        <textarea class="inp" id="f-desc" placeholder="景點說明…"></textarea>
      </div>
      <div class="field">
        <label>照片</label>
        <div class="upload-area" id="upload-area"
             onclick="document.getElementById('f-photo-file').click()"
             ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <div class="upload-hint" id="upload-hint">
            <span class="upload-hint-icon">📷</span>
            <span class="upload-hint-text">點擊或拖放圖片上傳（自動壓縮）</span>
          </div>
          <img class="upload-preview" id="upload-preview" src="" alt="">
        </div>
        <input type="file" id="f-photo-file" accept="image/*" style="display:none" onchange="handlePhotoUpload(this)">
        <div class="upload-meta" id="upload-meta" style="display:none">
          <span id="upload-size-info"></span>
          <button class="upload-clear" onclick="clearPhoto()">✕ 移除照片</button>
        </div>
      </div>
      <div class="field">
        <label>分級票價</label>
        <div class="pricing-rows" id="pricing-rows"></div>
        <button class="btn btn-ghost btn-sm add-row-btn" onclick="addPricingRow()">＋ 新增票種</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="saveTicket()">儲存</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

// ── State ──
let _data       = []
let _editId     = null
let _photoDataUrl = null

// ── Init ──
function buildDestSelects() {
  const filterSel = document.getElementById('filter-dest')
  const modalSel  = document.getElementById('f-dest')
  DEST_GROUPS.forEach(g => {
    const og1 = document.createElement('optgroup')
    const og2 = document.createElement('optgroup')
    og1.label = og2.label = g.label
    g.opts.forEach(o => {
      og1.appendChild(new Option(o, o))
      og2.appendChild(new Option(o, o))
    })
    filterSel.appendChild(og1)
    modalSel.appendChild(og2)
  })
}

async function loadTickets() {
  const { data, error } = await sb
    .from('gomars_tickets')
    .select('*')
    .order('dest')
    .order('name')
  if (error) { showToast('載入失敗：' + error.message, 'err'); return }
  _data = data || []
  renderTable()
}

// ── Render ──
function renderTable() {
  const q    = document.getElementById('search-inp').value.trim().toLowerCase()
  const dest = document.getElementById('filter-dest').value
  const rows = _data.filter(r => {
    if (dest && r.dest !== dest) return false
    if (q && !r.name?.toLowerCase().includes(q) && !r.dest?.toLowerCase().includes(q)) return false
    return true
  })
  document.getElementById('count-chip').textContent = _data.length + ' 筆'
  const tbody = document.getElementById('tbl-body')
  if (!rows.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">尚無資料，請點「新增景點」建立第一筆</td></tr>'
    return
  }
  tbody.innerHTML = rows.map(r => {
    const pricing = Array.isArray(r.pricing) ? r.pricing : []
    const pText   = pricing.length
      ? pricing.map(p => `${p.grade} NT$${Number(p.price).toLocaleString()}`).join('・')
      : '—'
    const desc  = r.description ? escHtml(r.description).substring(0, 38) + (r.description.length > 38 ? '…' : '') : '—'
    const thumb = r.photo_url
      ? `<img class="thumb" src="${escHtml(r.photo_url)}" alt="" loading="lazy">`
      : `<div class="thumb" style="display:flex;align-items:center;justify-content:center;font-size:16px">🎫</div>`
    return `<tr>
      <td>${thumb}</td>
      <td><span class="dest-chip">${escHtml(r.dest || '—')}</span></td>
      <td style="font-weight:600">${escHtml(r.name || '—')}</td>
      <td style="color:var(--tx2);font-size:12px">${desc}</td>
      <td style="font-size:12px;color:var(--tx2)">${escHtml(pText)}</td>
      <td><div class="ops">
        <button class="btn btn-ghost btn-sm" onclick="editTicket('${r.id}')">編輯</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTicket('${r.id}')">刪除</button>
      </div></td>
    </tr>`
  }).join('')
}

// ── Modal open/close ──
function openModal(id) {
  _editId = id || null
  _photoDataUrl = null
  document.getElementById('modal-title').textContent = id ? '編輯景點' : '新增景點'
  document.getElementById('f-dest').value  = ''
  document.getElementById('f-name').value  = ''
  document.getElementById('f-desc').value  = ''
  document.getElementById('f-photo-file').value = ''
  document.getElementById('pricing-rows').innerHTML = ''
  setPhotoPreview(null)

  if (id) {
    const r = _data.find(x => x.id === id)
    if (r) {
      document.getElementById('f-dest').value = r.dest || ''
      document.getElementById('f-name').value = r.name || ''
      document.getElementById('f-desc').value = r.description || ''
      if (r.photo_url) { _photoDataUrl = r.photo_url; setPhotoPreview(r.photo_url) }
      const pricing = Array.isArray(r.pricing) ? r.pricing : []
      pricing.forEach(p => addPricingRow(p.grade, p.price))
    }
  }
  if (!document.querySelectorAll('#pricing-rows .pricing-row').length) addPricingRow()
  document.getElementById('modal-bd').classList.add('open')
  document.getElementById('f-name').focus()
}

function editTicket(id) { openModal(id) }

function closeModal() {
  document.getElementById('modal-bd').classList.remove('open')
}

function onBdClick(e) {
  if (e.target === document.getElementById('modal-bd')) closeModal()
}

// ── Photo upload / compress ──
function setPhotoPreview(dataUrl) {
  const preview = document.getElementById('upload-preview')
  const hint    = document.getElementById('upload-hint')
  const meta    = document.getElementById('upload-meta')
  if (dataUrl) {
    preview.src = dataUrl
    preview.classList.add('show')
    hint.style.display = 'none'
    meta.style.display = 'flex'
  } else {
    preview.src = ''
    preview.classList.remove('show')
    hint.style.display = 'flex'
    meta.style.display = 'none'
    document.getElementById('upload-size-info').textContent = ''
  }
}

function clearPhoto() {
  _photoDataUrl = null
  document.getElementById('f-photo-file').value = ''
  setPhotoPreview(null)
}

function handlePhotoUpload(input) {
  const file = input.files[0]
  if (!file) return
  if (!file.type.startsWith('image/')) { showToast('請上傳圖片檔案', 'err'); return }
  compressImage(file, 800, 0.72).then(dataUrl => {
    _photoDataUrl = dataUrl
    setPhotoPreview(dataUrl)
    const kb = Math.round(dataUrl.length * 3 / 4 / 1024)
    document.getElementById('upload-size-info').textContent = `壓縮後 ${kb} KB`
  })
}

function compressImage(file, maxDim, quality) {
  return new Promise(resolve => {
    const reader = new FileReader()
    reader.onload = e => {
      const img = new Image()
      img.onload = () => {
        let w = img.width, h = img.height
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = Math.round(h * maxDim / w); w = maxDim }
          else       { w = Math.round(w * maxDim / h); h = maxDim }
        }
        const canvas = document.createElement('canvas')
        canvas.width = w; canvas.height = h
        canvas.getContext('2d').drawImage(img, 0, 0, w, h)
        resolve(canvas.toDataURL('image/jpeg', quality))
      }
      img.src = e.target.result
    }
    reader.readAsDataURL(file)
  })
}

function onDragOver(e) {
  e.preventDefault()
  document.getElementById('upload-area').classList.add('drag-over')
}
function onDragLeave() {
  document.getElementById('upload-area').classList.remove('drag-over')
}
function onDrop(e) {
  e.preventDefault()
  document.getElementById('upload-area').classList.remove('drag-over')
  const file = e.dataTransfer.files[0]
  if (file && file.type.startsWith('image/')) {
    const dt = new DataTransfer()
    dt.items.add(file)
    const input = document.getElementById('f-photo-file')
    input.files = dt.files
    handlePhotoUpload(input)
  }
}

// ── Pricing rows ──
function addPricingRow(grade = '', price = '') {
  const wrap = document.getElementById('pricing-rows')
  const row  = document.createElement('div')
  row.className = 'pricing-row'
  row.innerHTML = `
    <input class="inp" type="text"   placeholder="票種（大人／小孩）" value="${escHtml(grade)}">
    <input class="inp" type="number" placeholder="NT$" value="${price}" min="0">
    <button class="rm-row-btn" onclick="this.closest('.pricing-row').remove()" title="移除">✕</button>
  `
  wrap.appendChild(row)
}

// ── Save ──
async function saveTicket() {
  const dest = document.getElementById('f-dest').value.trim()
  const name = document.getElementById('f-name').value.trim()
  const desc = document.getElementById('f-desc').value.trim()
  if (!dest) { showToast('請選擇目的地', 'err'); return }
  if (!name) { showToast('請填寫景點名稱', 'err'); return }

  const pricingRows = [...document.querySelectorAll('#pricing-rows .pricing-row')]
  const pricing = pricingRows
    .map(row => {
      const [gradeI, priceI] = row.querySelectorAll('input')
      return { grade: gradeI.value.trim(), price: Number(priceI.value) || 0 }
    })
    .filter(p => p.grade)

  const payload = {
    dest, name,
    description: desc || null,
    photo_url:   _photoDataUrl || null,
    pricing:     pricing.length ? pricing : null,
    updated_at:  new Date().toISOString(),
  }
  if (_editId) payload.id = _editId

  const { data, error } = await sb.from('gomars_tickets').upsert(payload, { onConflict: 'id' }).select()
  if (error) { showToast('儲存失敗：' + error.message, 'err'); return }

  const saved = data[0]
  if (_editId) {
    _data = _data.map(r => r.id === _editId ? saved : r)
    showToast('已更新', 'ok')
  } else {
    _data.unshift(saved)
    showToast('已新增', 'ok')
  }
  closeModal()
  renderTable()
}

// ── Delete ──
async function deleteTicket(id) {
  if (!confirm('確定要刪除這筆門票資料？')) return
  const { error } = await sb.from('gomars_tickets').delete().eq('id', id)
  if (error) { showToast('刪除失敗：' + error.message, 'err'); return }
  _data = _data.filter(r => r.id !== id)
  showToast('已刪除', 'ok')
  renderTable()
}

// ── Toast / Util ──
function showToast(msg, type = 'info') {
  const wrap = document.getElementById('toast-wrap')
  const el   = document.createElement('div')
  el.className = `toast ${type}`
  el.textContent = msg
  wrap.appendChild(el)
  setTimeout(() => el.remove(), 3000)
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

buildDestSelects()
loadTickets()
</script>
