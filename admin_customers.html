<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>客戶管理</title>
<link rel="stylesheet" href="gomars_base.css">
<style>
body{margin:0;padding:0;background:var(--bg-surface);overflow-y:auto;}

/* ══════════════════════════════════════
   CRM — 客戶管理
══════════════════════════════════════ */
.crm-wrap{padding:20px;display:flex;flex-direction:column;gap:14px;}
.crm-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.crm-stat-card{background:var(--bg-card);border:.5px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);}
.crm-stat-val{font-size:26px;font-weight:700;line-height:1;}
.crm-stat-lbl{font-size:11px;color:var(--tx3);margin-top:4px;}
.crm-stat-sub{font-size:11px;margin-top:6px;}
.crm-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.crm-seg{display:flex;background:var(--bg-surface);border:.5px solid var(--border);border-radius:8px;padding:2px;gap:2px;}
.crm-seg-btn{padding:5px 12px;border-radius:6px;border:none;background:transparent;font-family:var(--font);font-size:12px;color:var(--tx2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.crm-seg-btn.on{background:var(--bg-card);color:var(--tx);font-weight:500;box-shadow:var(--shadow);}
.crm-table-wrap{background:var(--bg-card);border:.5px solid var(--border);border-radius:12px;overflow:hidden;}
.crm-table{width:100%;border-collapse:collapse;}
.crm-table th{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;padding:9px 14px;text-align:left;border-bottom:.5px solid var(--border);background:var(--bg-surface);}
.crm-table td{padding:10px 14px;font-size:12.5px;border-bottom:.5px solid var(--border-soft);color:var(--tx);vertical-align:middle;}
.crm-table tr:last-child td{border-bottom:none;}
.crm-table tbody tr:hover td{background:var(--bg-surface);cursor:pointer;}
.crm-company{font-weight:600;}
.crm-contact{color:var(--tx2);font-size:12px;}
.badge-cactive{background:var(--grb);color:var(--grd);}
.badge-cpending{background:#FFF3E0;color:#B85C00;}
.badge-cinactive{background:var(--g100);color:var(--g600);}

/* ── Customer Detail Modal (right slide-in) ── */
.cust-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-start;justify-content:flex-end;}
.cust-overlay.open{display:flex;}
.cust-modal{width:860px;max-width:96vw;height:100vh;background:var(--bg-card);display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.2);overflow:hidden;}
.cust-modal-hdr{padding:14px 20px;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.cust-modal-body{flex:1;display:grid;grid-template-columns:1fr 300px;min-height:0;overflow:hidden;}
.cust-modal-left{padding:20px;border-right:.5px solid var(--border);overflow-y:auto;}
.cust-modal-right{padding:16px;overflow-y:auto;background:var(--bg-surface);display:flex;flex-direction:column;gap:12px;}
.cust-avatar{width:44px;height:44px;border-radius:10px;background:var(--brl);border:.5px solid var(--brm);color:var(--orbit);font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cust-field-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.cust-field{display:flex;flex-direction:column;gap:3px;}
.cust-field-lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--tx3);}
.cust-field-val{font-size:13px;color:var(--tx);}
.timeline-item{display:flex;gap:10px;padding:9px 14px;border-bottom:.5px solid var(--border);}
.timeline-item:last-child{border-bottom:none;}
.timeline-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.timeline-meta{font-size:11px;color:var(--tx3);margin-top:3px;}
.quote-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg-card);border:.5px solid var(--border);border-radius:8px;}
.quote-title{font-size:12px;font-weight:600;color:var(--tx);}
.qsp{padding:2px 7px;border-radius:999px;font-size:10px;font-weight:600;}
.qsp-won{background:var(--grb);color:var(--grd);}
.qsp-sent{background:var(--blb);color:var(--bld);}
.qsp-draft{background:var(--g100);color:var(--g600);}
.crm-mini-stat{padding:10px;background:var(--bg-surface);border-radius:8px;text-align:center;}
.crm-mini-val{font-size:18px;font-weight:700;line-height:1;}
.crm-mini-lbl{font-size:10px;color:var(--tx3);margin-top:2px;}
</style>
</head>
<body>

<!-- 客戶列表 -->
<div class="crm-wrap">

    </div>
    <div class="crm-stat-card">

      <div class="crm-stat-sub" style="color:var(--gr);">持續往來中</div>
    </div>
    <div class="crm-stat-card">
      <div class="crm-stat-val" id="crm-stat-pending" style="color:var(--dust);">—</div>

          <th>產業</th>

          <th>負責業務</th>

        </tr>
      </thead>
      <tbody id="crm-tbody">
        <tr><td colspan="8" style="text-align:center;color:var(--tx3);padding:28px;">載入中…</td></tr>
      </tbody>
    </table>
  </div>

</div>

══════════════════════════════════════ -->

        </div>

        <div style="margin-top:20px;padding-top:16px;border-top:.5px solid var(--border);">

        </div>
      </div>

      </div>
    </div>

</div>

let _crmFilter = 'all'

const CRM_STATUS_MAP = {
  active:   { label: '活躍',   cls: 'badge badge-cactive' },
  pending:  { label: '跟進中', cls: 'badge badge-cpending' },
  inactive: { label: '停用',   cls: 'badge badge-cinactive' },
}
const CRM_FOLLOW_LABEL = { call: '電話', visit: '拜訪', email: 'Email', quote: '報價' }
const CRM_FOLLOW_COLOR = { call: 'var(--bl)', visit: 'var(--gr)', email: 'var(--g400)', quote: 'var(--orbit)' }
const CRM_ORDER_STATUS = {
  won:   { label: '成交',   cls: 'qsp qsp-won' },
  sent:  { label: '已送出', cls: 'qsp qsp-sent' },
  draft: { label: '草稿',   cls: 'qsp qsp-draft' },
}

function setCrmFilter(val, btn) {
  _crmFilter = val
  document.querySelectorAll('#crm-status-seg .crm-seg-btn').forEach(b => b.classList.remove('on'))
  if (btn) btn.classList.add('on')
  renderCustomers()
}

function renderCustomers() {
  const q = (document.getElementById('crm-search')?.value || '').toLowerCase()
  let list = mockCustomers
  if (_crmFilter !== 'all') list = list.filter(c => c.status === _crmFilter)
  if (q) list = list.filter(c =>
    c.company.toLowerCase().includes(q) ||
    c.contact_name.toLowerCase().includes(q) ||
    (c.industry || '').toLowerCase().includes(q)
  )

  // Stats
  const allOrders = mockCustomers.flatMap(c => c.orders)
  const wonCount  = allOrders.filter(o => o.status === 'won').length
  const rate = allOrders.length ? Math.round(wonCount / allOrders.length * 100) : 0
  document.getElementById('crm-stat-total').textContent   = mockCustomers.length
  document.getElementById('crm-stat-active').textContent  = mockCustomers.filter(c => c.status === 'active').length
  document.getElementById('crm-stat-pending').textContent = mockCustomers.filter(c => c.status === 'pending').length
  document.getElementById('crm-stat-rate').textContent    = rate + '%'

  // Notify parent to update sidebar badge
  window.parent.postMessage({ action: 'updateBadge', id: 'badge-customers', value: mockCustomers.length }, '*')

  const tbody = document.getElementById('crm-tbody')
  if (!tbody) return
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--tx3);padding:28px;">無符合條件的客戶</td></tr>'
    return
  }
  tbody.innerHTML = list.map(c => {
    const s = CRM_STATUS_MAP[c.status] || { label: c.status, cls: 'badge' }
    const lastFollow = c.follow_ups[0]?.date || '—'
    return `<tr onclick="openCustDetail('${c.id}')">
      <td><div class="crm-company">${c.company}</div></td>
      <td><div class="crm-contact">${c.contact_name}</div></td>
      <td style="font-size:12px;color:var(--tx2);">${c.phone}</td>
      <td><span class="badge badge-blue" style="font-size:10px;">${c.industry || '—'}</span></td>
      <td><span class="${s.cls}">${s.label}</span></td>
      <td style="font-size:12px;color:var(--tx3);">${lastFollow}</td>
      <td style="font-size:12px;color:var(--tx2);">${c.owner}</td>
      <td><button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();openCustDetail('${c.id}')">詳情 →</button></td>
    </tr>`
  }).join('')
}

function openCustDetail(id) {
  const c = mockCustomers.find(x => x.id === id)
  if (!c) return
  const overlay = document.getElementById('cust-overlay')

  // Header
  document.getElementById('cust-modal-avatar').textContent  = c.company.charAt(0)
  document.getElementById('cust-modal-company').textContent = c.company
  document.getElementById('cust-modal-meta').textContent    = `客戶編號：${c.id} ・ 建立：${c.created_at}`

  const s = CRM_STATUS_MAP[c.status] || { label: c.status, cls: 'badge' }
  document.getElementById('cust-modal-badges').innerHTML =
    `<span class="${s.cls}">${s.label}</span>` +
    (c.industry ? `<span class="badge badge-blue" style="font-size:10px;">${c.industry}</span>` : '')

  // Fields
  document.getElementById('cf-contact').textContent  = c.contact_name || '—'
  document.getElementById('cf-phone').textContent    = c.phone || '—'
  document.getElementById('cf-email').textContent    = c.email || '—'
  document.getElementById('cf-industry').textContent = c.industry || '—'
  document.getElementById('cf-owner').textContent    = c.owner || '—'
  document.getElementById('cf-created').textContent  = c.created_at
  document.getElementById('cf-notes').textContent    = c.notes || '尚無備註'

  // Mini stats
  const created  = new Date(c.created_at)
  const months   = Math.max(0, Math.floor((Date.now() - created.getTime()) / (1000 * 60 * 60 * 24 * 30)))
  const wonOrders = c.orders.filter(o => o.status === 'won')
  const totalWon  = wonOrders.reduce((acc, o) => acc + (o.amount || 0), 0)
  const winRate   = c.orders.length ? Math.round(wonOrders.length / c.orders.length * 100) : 0
  document.getElementById('cf-months').textContent  = months
  document.getElementById('cf-follows').textContent = c.follow_ups.length
  document.getElementById('cf-won').textContent     = Math.round(totalWon / 1000) + 'K'
  document.getElementById('cf-rate').textContent    = c.orders.length ? winRate + '%' : '—'

  // Timeline
  const tlEl = document.getElementById('cf-timeline')
  tlEl.innerHTML = c.follow_ups.length
    ? c.follow_ups.map(f => `
        <div class="timeline-item">
          <div class="timeline-dot" style="background:${CRM_FOLLOW_COLOR[f.type] || 'var(--g400)'};"></div>
          <div style="flex:1;">
            <div style="font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px;">
              ${CRM_FOLLOW_LABEL[f.type] || f.type}
            </div>
            <div style="font-size:12.5px;color:var(--tx);line-height:1.5;">${f.summary}</div>
            ${f.next ? `<div style="font-size:11px;color:var(--orbit);font-weight:600;margin-top:3px;">→ ${f.next}</div>` : ''}
            <div class="timeline-meta">${f.date}</div>
          </div>
        </div>`).join('')
    : '<div style="padding:16px;text-align:center;font-size:12px;color:var(--tx3);">尚無跟進紀錄</div>'

  // Quotes
  const qEl = document.getElementById('cf-quotes')
  qEl.innerHTML = c.orders.length
    ? c.orders.map(o => {
        const qs = CRM_ORDER_STATUS[o.status] || { label: o.status, cls: 'qsp qsp-draft' }
        return `<div class="quote-item">
          <div>
            <div class="quote-title">${o.title}</div>
            <div style="font-size:11px;color:var(--tx3);margin-top:2px;">NT$ ${(o.amount || 0).toLocaleString()}</div>
          </div>
          <span class="${qs.cls}">${qs.label}</span>
        </div>`
      }).join('')
    : '<div style="font-size:12px;color:var(--tx3);text-align:center;padding:8px 0;">尚無報價紀錄</div>'

  overlay.classList.add('open')
}

function closeCustDetail() {
  document.getElementById('cust-overlay').classList.remove('open')
}

// ── 監聽來自父視窗的指令 ──
window.addEventListener('message', (e) => {
  if (e.data?.action === 'refresh') renderCustomers()
})

// ── 初始化 ──
renderCustomers()
</script>
</body>
</html>
